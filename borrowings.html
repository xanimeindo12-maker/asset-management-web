<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peminjaman Aset - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Peminjaman Aset</h1>
                <p class="page-subtitle">Manajemen Peminjaman Perangkat dan Aksesoris</p>
            </div>
            <button class="btn-primary">
                <i class="fa-solid fa-plus-circle"></i> CATAT PEMINJAMAN
            </button>
        </div>

        <div class="filter-panel">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Cari peminjam, aset, atau departemen...">
            </div>
            <select class="filter-select">
                <option value="">Semua Status</option>
                <option value="DIPINJAM">DIPINJAM</option>
                <option value="TERLAMBAT">TERLAMBAT</option>
                <option value="DIKEMBALIKAN">DIKEMBALIKAN</option>
            </select>
        </div>

        <div class="stats-grid-3" style="margin-bottom: 24px;">
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fa-solid fa-hand-holding"></i>
                </div>
                <div>
                    <p class="stat-label">Total Dipinjam</p>
                    <h3 class="stat-value">24</h3>
                    <p class="stat-desc">Active loans</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon rose">
                    <i class="fa-solid fa-clock"></i>
                </div>
                <div>
                    <p class="stat-label">Terlambat</p>
                    <h3 class="stat-value">3</h3>
                    <p class="stat-desc">Overdue items</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon emerald">
                    <i class="fa-solid fa-rotate-left"></i>
                </div>
                <div>
                    <p class="stat-label">Dikembalikan</p>
                    <h3 class="stat-value">156</h3>
                    <p class="stat-desc">Returned items</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fa-solid fa-clipboard-list" style="color: #6366f1;"></i>
                    MASTER ASSET LENDING
                </div>
                <span class="badge-live">LIVE DATA</span>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%; text-align: center;">NO</th>
                            <th style="width: 12%;">TANGGAL PINJAM</th>
                            <th style="width: 15%;">ASET</th>
                            <th style="width: 15%;">PEMINJAM</th>
                            <th style="width: 12%;">DEPARTEMEN</th>
                            <th style="width: 12%;">ESTIMASI KEMBALI</th>
                            <th style="width: 10%; text-align: center;">STATUS</th>
                            <th style="width: 19%; text-align: center;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="borrowingsTableBody">
                        <!-- Data will be loaded by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-info">Showing 1 to 10 of 24 entries</div>
                <div class="pagination-buttons">
                    <button class="btn-nav" disabled>Previous</button>
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-page">3</button>
                    <button class="btn-nav">Next</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const borrowingsData = [
            { id: 1, date: '2026-06-01', asset: 'LPT-ASTRA-100', borrower: 'User 45', dept: 'Procurement', returnDate: '2026-06-15', status: 'DIPINJAM' },
            { id: 2, date: '2026-05-20', asset: 'IT-PC-TAF01', borrower: 'Taufik', dept: 'IT Dept', returnDate: '2026-05-27', status: 'TERLAMBAT' },
            { id: 3, date: '2026-06-05', asset: 'SW-CORE-01', borrower: 'Arief', dept: 'IT Dept', returnDate: '2026-06-08', status: 'DIKEMBALIKAN' },
        ];

        const tableBody = document.getElementById('borrowingsTableBody');
        borrowingsData.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align: center; font-weight: 700; color: #d6d3d1;">${index + 1}</td>
                <td style="font-weight: 900; font-size: 11px;">${item.date}</td>
                <td style="font-weight: 700; font-size: 11px;">${item.asset}</td>
                <td style="font-weight: 700; font-size: 11px;">${item.borrower}</td>
                <td style="font-size: 11px;">${item.dept}</td>
                <td style="font-family: monospace; font-size: 11px;">${item.returnDate}</td>
                <td style="text-align: center;">
                    <span class="badge-status ${item.status === 'DIPINJAM' ? 'active' : item.status === 'TERLAMBAT' ? 'urgent' : 'available'}">
                        ${item.status}
                    </span>
                </td>
                <td style="text-align: center;">
                    <button class="btn-icon edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon" style="background: #d1fae5; color: #059669;" title="Kembalikan"><i class="fa-solid fa-rotate-left"></i></button>
                    <button class="btn-icon delete" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
