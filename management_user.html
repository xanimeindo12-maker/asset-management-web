<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Tim - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Kelola Tim</h1>
                <p class="page-subtitle">User & Team Management</p>
            </div>
            <button class="btn-primary">
                <i class="fa-solid fa-user-plus"></i> TAMBAH USER
            </button>
        </div>

        <div class="filter-panel">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Cari nama, username, atau email...">
            </div>
            <select class="filter-select">
                <option value="">Semua Role</option>
                <option value="ADMINISTRATOR">Administrator</option>
                <option value="IT ENGINEER">IT Engineer</option>
                <option value="USER">User</option>
            </select>
            <select class="filter-select">
                <option value="">Semua Status</option>
                <option value="ACTIVE">Active</option>
                <option value="INACTIVE">Inactive</option>
            </select>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fa-solid fa-users" style="color: #6366f1;"></i>
                    TEAM MEMBERS
                </div>
                <span class="badge-live">8 ACTIVE USERS</span>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 25%;">USER</th>
                            <th style="width: 12%;">USERNAME</th>
                            <th style="width: 12%;">ROLE</th>
                            <th style="width: 12%;">DEPARTEMEN</th>
                            <th style="width: 15%;">EMAIL</th>
                            <th style="width: 10%; text-align: center;">STATUS</th>
                            <th style="width: 14%; text-align: center;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Data will be loaded by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-info">Showing 1 to 5 of 8 entries</div>
                <div class="pagination-buttons">
                    <button class="btn-nav" disabled>Previous</button>
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-nav">Next</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const usersData = [
            { id: 1, name: 'Admin System', username: 'administrator', role: 'ADMINISTRATOR', dept: 'IT Dept', email: 'admin@itdse.com', status: 'ACTIVE', initials: 'AS' },
            { id: 2, name: 'Muhammad Taufik', username: 'taufik', role: 'IT ENGINEER', dept: 'IT Dept', email: 'taufik@itdse.com', status: 'ACTIVE', initials: 'MT' },
            { id: 3, name: 'Arief', username: 'arief', role: 'IT ENGINEER', dept: 'IT Dept', email: 'arief@itdse.com', status: 'ACTIVE', initials: 'AR' },
            { id: 4, name: 'Wahyu', username: 'wahyu', role: 'IT ENGINEER', dept: 'IT Dept', email: 'wahyu@itdse.com', status: 'ACTIVE', initials: 'WH' },
            { id: 5, name: 'User 45', username: 'user45', role: 'USER', dept: 'Procurement', email: 'user45@company.com', status: 'ACTIVE', initials: 'U4' },
        ];

        const tableBody = document.getElementById('usersTableBody');
        usersData.forEach((user, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="user-avatar" style="background: ${index % 2 === 0 ? 'linear-gradient(135deg, #e0e7ff, #c7d2fe)' : 'linear-gradient(135deg, #d1fae5, #a7f3d0)'}; color: ${index % 2 === 0 ? '#4f46e5' : '#059669'};">
                            ${user.initials}
                        </div>
                        <div>
                            <div style="font-weight: 700; color: #1a1a1a;">${user.name}</div>
                            <div style="font-size: 11px; color: #6b7280;">${user.email}</div>
                        </div>
                    </div>
                </td>
                <td style="font-weight: 700; font-size: 11px;">${user.username}</td>
                <td style="text-align: center;">
                    <span class="role-badge ${user.role === 'ADMINISTRATOR' ? 'role-admin' : user.role === 'IT ENGINEER' ? 'role-engineer' : 'role-user'}">
                        ${user.role}
                    </span>
                </td>
                <td style="font-size: 11px;">${user.dept}</td>
                <td style="font-size: 11px;">${user.email}</td>
                <td style="text-align: center;">
                    <span class="badge-status ${user.status === 'ACTIVE' ? 'active' : 'urgent'}">
                        ${user.status}
                    </span>
                </td>
                <td style="text-align: center;">
                    <button class="btn-icon edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon delete" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
