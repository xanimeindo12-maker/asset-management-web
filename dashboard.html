<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Management Aset</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <main class="content">
        <header class="top-bar">
            <div class="breadcrumb">Home / <span class="current-page">Dashboard Overview</span></div>
            <div class="top-actions">
                <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i><span class="badge-dot"></span></button>
            </div>
        </header>

        <div id="page-content">
            <!-- ISI KONTEN DASHBOARD DI SINI -->
            <div class="welcome-banner">
                <h1>Welcome back, Desktop Support Engineer</h1>
                <p>Here is the latest status of your IT DSE Operations.</p>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon blue"><i class="fa-solid fa-database"></i></div>
                    <div class="kpi-info"><h3>TOTAL ASSETS</h3><div class="value">181</div><div class="sub">IT devices in system</div></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon orange"><i class="fa-solid fa-wrench"></i></div>
                    <div class="kpi-info"><h3>ACTIVE MAINTENANCE</h3><div class="value">3</div><div class="sub">Pending PM tasks</div></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon green"><i class="fa-regular fa-clock"></i></div>
                    <div class="kpi-info"><h3>PENDING PM (JUNI)</h3><div class="value">3</div><div class="sub">For the current month</div></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // INISIALISASI HALAMAN INI
        document.addEventListener('DOMContentLoaded', () => {
            initPage('dashboard'); // Ini akan load sidebar & highlight menu
        });
    </script>
</body>
</html>
