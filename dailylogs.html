<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Activity Logs - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Daily Activity Logs</h1>
                <p class="page-subtitle">Digitalized Operational Activity Management</p>
            </div>
            <button class="btn-primary" onclick="document.getElementById('addLogModal').classList.remove('hidden')">
                <i class="fa-solid fa-plus-circle"></i> ADD NEW ACTIVITY
            </button>
        </div>

        <div class="filter-panel">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Cari aktivitas, nomor perangkat, atau engineer...">
            </div>
            <select class="filter-select">
                <option value="">Semua Bulan</option>
                <option value="05-2026">Mei 2026</option>
                <option value="06-2026">Juni 2026</option>
            </select>
            <select class="filter-select">
                <option value="">Semua Kategori</option>
                <option value="TROUBLESHOOTING">TROUBLESHOOTING</option>
                <option value="SERVICE">SERVICE</option>
                <option value="-">Tanpa Kategori (-)</option>
            </select>
            <select class="filter-select">
                <option value="">Semua Divisi</option>
                <option value="IT Dept">IT Dept</option>
                <option value="Logistics">Logistics</option>
                <option value="Finance">Finance</option>
                <option value="Procurement">Procurement</option>
                <option value="HR Dept">HR Dept</option>
                <option value="Engineering">Engineering</option>
                <option value="-">Tanpa Divisi (-)</option>
            </select>
            <button class="btn-reset">Reset</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fa-solid fa-database" style="color: #6366f1;"></i>
                    MASTER ACTIVITY STREAM
                </div>
                <span class="badge-live">REAL-TIME DATA FEED</span>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%; text-align: center;">NO</th>
                            <th style="width: 10%;">DATE</th>
                            <th style="width: 12%;">ASSET NUMBER</th>
                            <th style="width: 20%;">NAME / USER</th>
                            <th style="width: 8%; text-align: center;">DIVISI</th>
                            <th style="width: 12%;">CATEGORY</th>
                            <th style="width: 12%; text-align: center;">TIME (START-END)</th>
                            <th style="width: 6%; text-align: center;">ACTUAL</th>
                            <th style="width: 15%;">ENGINEER</th>
                        </tr>
                    </thead>
                    <tbody id="dailyLogsTableBody">
                        <!-- Data will be loaded by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-info">Showing 1 to 3 of 15 entries</div>
                <div class="pagination-buttons">
                    <button class="btn-nav" disabled>Previous</button>
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-page">3</button>
                    <button class="btn-nav">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Log Modal -->
    <div id="addLogModal" class="modal hidden">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                <h3 style="color: white; font-weight: 900;">TAMBAH AKTIVITAS BARU</h3>
                <button class="modal-close" onclick="document.getElementById('addLogModal').classList.add('hidden')">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="addLogForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label class="form-label">USER / NAMA <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="form-input" placeholder="Nama lengkap user" required>
                    </div>
                    <div>
                        <label class="form-label">ASSET NUMBER</label>
                        <input type="text" class="form-input" placeholder="Nomor aset (opsional)">
                    </div>
                    <div>
                        <label class="form-label">DIVISI</label>
                        <select class="form-input">
                            <option value="">- (Pilih Divisi)</option>
                            <option value="IT Dept">IT Dept</option>
                            <option value="Logistics">Logistics</option>
                            <option value="Finance">Finance</option>
                            <option value="Procurement">Procurement</option>
                            <option value="HR Dept">HR Dept</option>
                            <option value="Engineering">Engineering</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">CATEGORY</label>
                        <select class="form-input">
                            <option value="">- (Pilih Kategori)</option>
                            <option value="TROUBLESHOOTING">TROUBLESHOOTING</option>
                            <option value="SERVICE">SERVICE</option>
                            <option value="-">Tanpa Kategori (-)</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">TANGGAL <span style="color: #ef4444;">*</span></label>
                        <input type="date" class="form-input" required>
                    </div>
                    <div>
                        <label class="form-label">WAKTU (START - END) <span style="color: #ef4444;">*</span></label>
                        <input type="time" class="form-input" required>
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <label class="form-label">ENGINEER <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="form-input" placeholder="Nama engineer yang menangani" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="document.getElementById('addLogModal').classList.add('hidden')">Batal</button>
                <button class="btn-primary" onclick="document.getElementById('addLogModal').classList.add('hidden')">
                    <i class="fa-solid fa-save"></i> Simpan Aktivitas
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Sample daily logs data
        const dailyLogsData = [
            {
                no: 1,
                date: '01/05/2026',
                asset: '-',
                user: 'TV RUANG MEETING & KOMPUTER',
                divisi: '-',
                category: '-',
                time: '06:30 - 06:35',
                actual: '5',
                engineer: 'MUHAMMAD TAUFIK'
            },
            {
                no: 2,
                date: '01/05/2026',
                asset: 'BTSJKOPNB22005',
                user: 'DENI AHMADI',
                divisi: 'PLANT',
                category: 'TROUBLESHOOTING',
                time: '09:00 - 09:23',
                actual: '23',
                engineer: 'MUHAMMAD TAUFIK'
            },
            {
                no: 3,
                date: '01/05/2026',
                asset: 'BTSJAGICU23001',
                user: 'YUNIDA RIZKI RAHMAYANI',
                divisi: 'SM',
                category: 'SERVICE',
                time: '14:17 - 14:37',
                actual: '20',
                engineer: 'MUHAMMAD TAUFIK'
            }
        ];

        const tableBody = document.getElementById('dailyLogsTableBody');
        dailyLogsData.forEach((log) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align: center; font-weight: 700; color: #d6d3d1;">${log.no}</td>
                <td style="font-weight: 900; font-size: 11px;">${log.date}</td>
                <td style="font-family: monospace; font-size: 11px;">
                    ${log.asset !== '-' ? `<span style="background: #eff6ff; color: #1e40af; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; border: 1px solid #dbeafe;">${log.asset}</span>` : '<span style="color: #a8a29e;">-</span>'}
                </td>
                <td style="font-weight: 700; font-size: 11px; text-transform: uppercase;">${log.user}</td>
                <td style="text-align: center; font-weight: 900; color: ${log.divisi === '-' ? '#a8a29e' : '#78716c'}; text-transform: uppercase; font-size: 11px;">${log.divisi}</td>
                <td>
                    ${log.category === '-' ? '<span style="color: #a8a29e;">-</span>' : `<span class="badge-category ${log.category === 'TROUBLESHOOTING' ? 'badge-troubleshooting' : 'badge-service'}">${log.category}</span>`}
                </td>
                <td style="text-align: center; font-family: monospace; font-size: 10px; font-weight: 700; color: #78716c;">${log.time}</td>
                <td style="text-align: center; font-weight: 900; color: #6366f1; font-size: 13px;">${log.actual}</td>
                <td style="font-weight: 700; font-style: italic; color: #78716c; text-transform: uppercase; font-size: 11px;">${log.engineer}</td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
