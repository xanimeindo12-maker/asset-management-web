<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICA - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>PICA - Problem Identification & Corrective Action</h1>
                <p class="page-subtitle">Tracking & Resolution Management</p>
            </div>
            <button class="btn-primary">
                <i class="fa-solid fa-plus-circle"></i> BUAT PICA
            </button>
        </div>

        <div class="filter-panel">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Cari problem, asset, atau PIC...">
            </div>
            <select class="filter-select">
                <option value="">Semua Priority</option>
                <option value="HIGH">HIGH</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="LOW">LOW</option>
            </select>
            <select class="filter-select">
                <option value="">Semua Status</option>
                <option value="OPEN">OPEN</option>
                <option value="IN PROGRESS">IN PROGRESS</option>
                <option value="CLOSED">CLOSED</option>
            </select>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fa-solid fa-clipboard-list" style="color: #6366f1;"></i>
                    PICA TRACKING LIST
                </div>
                <span class="badge-live">ACTIVE TRACKING</span>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%; text-align: center;">NO</th>
                            <th style="width: 12%;">PICA ID</th>
                            <th style="width: 25%;">PROBLEM DESCRIPTION</th>
                            <th style="width: 12%;">ASSET</th>
                            <th style="width: 8%; text-align: center;">PRIORITY</th>
                            <th style="width: 12%;">PIC</th>
                            <th style="width: 10%;">TANGGAL</th>
                            <th style="width: 10%; text-align: center;">STATUS</th>
                            <th style="width: 8%; text-align: center;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="picaTableBody">
                        <!-- Data will be loaded by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-info">Showing 1 to 5 of 12 entries</div>
                <div class="pagination-buttons">
                    <button class="btn-nav" disabled>Previous</button>
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-page">3</button>
                    <button class="btn-nav">Next</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const picaData = [
            { id: 1, picaId: 'PICA-2026-001', problem: 'Server rack overheating - cooling system malfunction', asset: 'SRV-RACK-A01', priority: 'HIGH', pic: 'Muhammad Taufik', date: '2026-06-01', status: 'IN PROGRESS' },
            { id: 2, picaId: 'PICA-2026-002', problem: 'Network switch intermittent connectivity issue', asset: 'SW-CORE-01', priority: 'HIGH', pic: 'Arief', date: '2026-06-03', status: 'OPEN' },
            { id: 3, picaId: 'PICA-2026-003', problem: 'Laptop battery degradation - replacement needed', asset: 'LPT-ASTRA-100', priority: 'MEDIUM', pic: 'Wahyu', date: '2026-05-28', status: 'CLOSED' },
            { id: 4, picaId: 'PICA-2026-004', problem: 'Printer sharing configuration error', asset: 'PR-HP-LJ500', priority: 'LOW', pic: 'Muhammad Taufik', date: '2026-05-25', status: 'CLOSED' },
            { id: 5, picaId: 'PICA-2026-005', problem: 'UPS battery backup insufficient', asset: 'UPS-ROOM-B', priority: 'MEDIUM', pic: 'Arief', date: '2026-06-05', status: 'OPEN' },
        ];

        const tableBody = document.getElementById('picaTableBody');
        picaData.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align: center; font-weight: 700; color: #d6d3d1;">${index + 1}</td>
                <td style="font-weight: 700; font-size: 11px; color: #6366f1;">${item.picaId}</td>
                <td style="font-size: 11px;">${item.problem}</td>
                <td style="font-weight: 700; font-size: 11px;">${item.asset}</td>
                <td style="text-align: center;">
                    <span class="priority-badge ${item.priority === 'HIGH' ? 'priority-high' : item.priority === 'MEDIUM' ? 'priority-medium' : 'priority-low'}">
                        ${item.priority}
                    </span>
                </td>
                <td style="font-weight: 700; font-size: 11px;">${item.pic}</td>
                <td style="font-size: 11px;">${item.date}</td>
                <td style="text-align: center;">
                    <span class="badge-status ${item.status === 'OPEN' ? 'action' : item.status === 'IN PROGRESS' ? 'available' : 'active'}">
                        ${item.status}
                    </span>
                </td>
                <td style="text-align: center;">
                    <button class="btn-icon edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon" style="background: #d1fae5; color: #059669;" title="Close"><i class="fa-solid fa-check"></i></button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
