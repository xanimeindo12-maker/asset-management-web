<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA Performance KPI - IT DSE Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            text-align: center;
        }
        .kpi-card .icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .kpi-card .icon.green { background: #d1fae5; color: #10b981; }
        .kpi-card .icon.blue { background: #dbeafe; color: #2563eb; }
        .kpi-card .icon.purple { background: #e0e7ff; color: #4f46e5; }
        .kpi-card .icon.orange { background: #fef3c7; color: #f59e0b; }
        .kpi-card .label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-card .value { font-size: 36px; font-weight: 800; color: #1a1a1a; }
        .kpi-card .target { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .progress-bar {
            height: 8px;
            background: #f3f4f6;
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #6366f1);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .chart-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 200px;
            padding: 20px 0;
            gap: 12px;
        }
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, #6366f1, #4f46e5);
            border-radius: 8px 8px 0 0;
            transition: height 0.5s;
            position: relative;
        }
        .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .bar-label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
        }
    </style>
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h1>PA Performance KPI</h1>
                <p class="subtitle">Physical Availability & Performance Metrics</p>
            </div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="icon green"><i class="fa-solid fa-server"></i></div>
                <div class="label">AVG WEEKLY PA</div>

            </div>
            <div class="kpi-card">
                <div class="icon blue"><i class="fa-solid fa-clock"></i></div>
                <div class="label">AVG RESPONSE TIME</div>
                <div class="value">15 min</div>
                <div class="target">Target: ≤ 30 min</div>
                <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
            </div>
            <div class="kpi-card">
                <div class="icon purple"><i class="fa-solid fa-check-circle"></i></div>
                <div class="label">PM COMPLETION RATE</div>
                <div class="value">96.5%</div>
                <div class="target">Target: ≥ 95%</div>
                <div class="progress-bar"><div class="progress-fill" style="width:96.5%"></div></div>
            </div>
            <div class="kpi-card">
                <div class="icon orange"><i class="fa-solid fa-chart-line"></i></div>
                <div class="label">MTTR</div>
                <div class="value">2.3 hrs</div>
                <div class="target">Target: ≤ 4 hrs</div>
                <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
            </div>
        </div>
