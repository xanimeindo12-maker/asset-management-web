<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="modern-login-body">
    <div class="modern-login-card">
        <!-- Logo Hexagonal -->
        <div class="logo-container">
            <div class="hexagon">
                <i class="fa-solid fa-tower-broadcast"></i>
            </div>
        </div>

        <!-- Header -->
        <div class="login-header">
            <h1>IT COMMAND CENTER</h1>
            <p class="subtitle">OPERATIONAL HUB</p>
        </div>

        <!-- Form Login -->
        <form id="login-form" class="modern-form">
            <div class="input-group">
                <label for="username">USERNAME</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Contoh: administrator" 
                    autocomplete="username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">PASSWORD</label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Masukkan kata sandi..." 
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="btn-login" class="btn-masuk">
                MASUK
            </button>

            <p id="login-msg" class="login-message"></p>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>COPYRIGHT © IT ENGINEER V1.0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
