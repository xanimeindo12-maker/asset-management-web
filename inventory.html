<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory List - IT Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Semua Aset List</h1>
                <p class="page-subtitle">Database Inventaris Perangkat dan Hardware Organisasi</p>
            </div>
            <button class="btn-primary" onclick="alert('Fitur tambah aset akan segera hadir!')">
                <i class="fa-solid fa-plus-circle"></i> TAMBAH PERANGKAT
            </button>
        </div>

        <div class="filter-panel">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Cari aset (Host, Serial, Vendor, Model...)">
            </div>
            <select class="filter-select">
                <option value="">Semua Tipe</option>
                <option value="Laptop">Laptop</option>
                <option value="Desktop">Desktop</option>
            </select>
            <select class="filter-select">
                <option value="">Semua Status</option>
                <option value="IN USE">IN USE</option>
                <option value="IN STOCK">IN STOCK</option>
                <option value="BREAKDOWN">BREAKDOWN</option>
            </select>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fa-solid fa-database" style="color: #6366f1;"></i>
                    MASTER INVENTORY STREAM
                </div>
                <span class="badge-live">LIVE DATABASE</span>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%; text-align: center;">NO</th>
                            <th style="width: 10%;">HOST NAME</th>
                            <th style="width: 12%;">SERIAL NUMBER</th>
                            <th style="width: 15%;">ASSIGNED TO</th>
                            <th style="width: 8%; text-align: center;">STATE</th>
                            <th style="width: 12%;">DEPARTMENT</th>
                            <th style="width: 15%;">LOCATION</th>
                            <th style="width: 13%;">WARRANTY EXPIRY</th>
                            <th style="width: 10%; text-align: center;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- Data will be loaded by JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-info">Showing 1 to 10 of 181 entries</div>
                <div class="pagination-buttons">
                    <button class="btn-nav" disabled>Previous</button>
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-page">3</button>
                    <button class="btn-nav">Next</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Sample inventory data
        const inventoryData = [
            { id: 1, host: 'IT-PC-TAF01', sn: 'SN-9812739218', assigned: 'Taufik', state: 'IN USE', dept: 'IT Dept', loc: 'Gedung A R.4', warranty: '2027-12-14' },
            { id: 2, host: 'LPT-ASTRA-100', sn: 'SN-9579568117', assigned: 'User 45', state: 'IN STOCK', dept: 'Procurement', loc: 'Gedung A R.1', warranty: '2027-08-15' },
            { id: 3, host: 'LPT-ASTRA-101', sn: 'SN-9245279805', assigned: 'User 46', state: 'IN STOCK', dept: 'HR Dept', loc: 'Gedung A R.2', warranty: '2027-08-15' },
            { id: 4, host: 'LPT-ASTRA-102', sn: 'SN-9105350356', assigned: 'User 47', state: 'IN STOCK', dept: 'Engineering', loc: 'Gedung A R.4', warranty: '2027-08-15' },
            { id: 5, host: 'LPT-ASTRA-103', sn: 'SN-9716618337', assigned: 'User 48', state: 'IN STOCK', dept: 'IT Dept', loc: 'Gedung B R.1', warranty: '2027-08-15' },
        ];

        const tableBody = document.getElementById('inventoryTableBody');
        inventoryData.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align: center; font-weight: 700; color: #d6d3d1;">${index + 1}</td>
                <td style="font-weight: 700; font-size: 11px;">${item.host}</td>
                <td style="font-family: monospace; font-size: 11px;">${item.sn}</td>
                <td style="font-weight: 700; font-size: 11px;">${item.assigned}</td>
                <td style="text-align: center;">
                    <span class="badge-status ${item.state === 'IN USE' ? 'active' : item.state === 'BREAKDOWN' ? 'urgent' : 'available'}">
                        ${item.state}
                    </span>
                </td>
                <td style="font-size: 11px;">${item.dept}</td>
                <td style="font-size: 11px;">${item.loc}</td>
                <td style="font-family: monospace; font-size: 11px;">${item.warranty}</td>
                <td style="text-align: center;">
                    <button class="btn-icon edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon delete" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
