<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Populasi Vendor Unit - IT DSE Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .vendor-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 4px solid #4f46e5;
        }
        .vendor-card h4 { font-size: 14px; color: #1a1a1a; margin-bottom: 8px; }
        .vendor-card .count { font-size: 28px; font-weight: 800; color: #4f46e5; }
        .vendor-card .label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }
        .bar-label { width: 100px; font-size: 13px; font-weight: 600; color: #374151; }
        .bar-track { flex: 1; height: 24px; background: #f3f4f6; border-radius: 12px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 12px; transition: width 0.5s; }
        .bar-value { width: 50px; text-align: right; font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .legend { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
        .legend-dot { width: 12px; height: 12px; border-radius: 4px; }
    </style>
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h1>Populasi Vendor Unit</h1>
                <p class="subtitle">Distribusi aset berdasarkan vendor</p>
            </div>
        </header>

        <div class="vendor-grid">
            <div class="vendor-card"><h4>Berco</h4><div class="count">45</div><div class="label">Desktop & Laptop</div></div>
            <div class="vendor-card" style="border-color: #f59e0b;"><h4>KOP</h4><div class="count" style="color:#f59e0b">32</div><div class="label">Server & Network</div></div>
            <div class="vendor-card" style="border-color: #10b981;"><h4>AGI</h4><div class="count" style="color:#10b981">28</div><div class="label">Printer & Peripheral</div></div>
            <div class="vendor-card" style="border-color: #ef4444;"><h4>MII</h4><div class="count" style="color:#ef4444">18</div><div class="label">Aksesoris IT</div></div>
            <div class="vendor-card" style="border-color: #8b5cf6;"><h4>Lainnya</h4><div class="count" style="color:#8b5cf6">12</div><div class="label">Mixed Vendor</div></div>
        </div>

        <div class="chart-container">
            <h3 style="font-size:16px; font-weight:700; margin-bottom:20px;"><i class="fa-solid fa-chart-bar"></i> Distribusi Vendor per Kategori</h3>
            <div class="bar-row"><div class="bar-label">Berco</div><div class="bar-track"><div class="bar-fill" style="width:75%; background:linear-gradient(90deg,#4f46e5,#6366f1)"></div></div><div class="bar-value">45</div></div>
            <div class="bar-row"><div class="bar-label">KOP</div><div class="bar-track"><div class="bar-fill" style="width:53%; background:linear-gradient(90deg,#f59e0b,#fbbf24)"></div></div><div class="bar-value">32</div></div>
            <div class="bar-row"><div class="bar-label">AGI</div><div class="bar-track"><div class="bar-fill" style="width:47%; background:linear-gradient(90deg,#10b981,#34d399)"></div></div><div class="bar-value">28</div></div>
            <div class="bar-row"><div class="bar-label">MII</div><div class="bar-track"><div class="bar-fill" style="width:30%; background:linear-gradient(90deg,#ef4444,#f87171)"></div></div><div class="bar-value">18</div></div>
            <div class="bar-row"><div class="bar-label">Lainnya</div><div class="bar-track"><div class="bar-fill" style="width:20%; background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div><div class="bar-value">12</div></div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#4f46e5"></div>Desktop</div>
                <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Server</div>
                <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Printer</div>
                <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Aksesoris</div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
